{% extends "base.html" %}
{% block title %}Reset Password — Lophoro IMS{% endblock %}
{% block breadcrumb %}Reset Password{% endblock %}

{% block content %}
<div class="form-card form-card-narrow" data-aos="fade-up">
  <div class="form-card-header">
    <div>
      <h2 class="form-card-title">Reset Password</h2>
      <p class="form-card-subtitle">Setting new password for <strong>{{ user_obj.username }}</strong></p>
    </div>
    <a href="/accounts/users/" class="btn-secondary">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      Back
    </a>
  </div>

  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">New Password</label>
      {{ form.new_password }}
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary">Update Password</button>
      <a href="/accounts/users/" class="btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
